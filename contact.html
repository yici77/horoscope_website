<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celestia — Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <a href="index.html" class="navbar__logo">
      <span class="navbar__logo-text">CELESTIA</span>
    </a>
    <nav class="navbar__links">
      <a href="index.html#zodiac" class="navbar__link">Horoscope</a>
      <a href="contact.html" class="navbar__link active">Contact</a>
    </nav>
    <button class="navbar__hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <section class="contact-section">
    <div class="contact-container">

      <h2>Connect with the Cosmos</h2>

      <div class="contact-divider">
        <span class="contact-divider-line"></span>
        <span class="contact-divider-symbol">☽ ✦ ☾</span>
        <span class="contact-divider-line"></span>
      </div>

      <p>Whether seeking celestial guidance or sharing feedback,<br>leave your message beneath the stars.</p>

      <form id="astrology-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="e.g., Orion Traveler" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="stars@example.com" required>
        </div>

        <div class="form-group">
          <label for="zodiac">Zodiac Sign</label>
          <select id="zodiac" name="zodiac">
            <option value="aries">Aries</option>
            <option value="taurus">Taurus</option>
            <option value="gemini">Gemini</option>
            <option value="cancer">Cancer</option>
            <option value="leo">Leo</option>
            <option value="virgo">Virgo</option>
            <option value="libra">Libra</option>
            <option value="scorpio">Scorpio</option>
            <option value="sagittarius">Sagittarius</option>
            <option value="capricorn">Capricorn</option>
            <option value="aquarius">Aquarius</option>
            <option value="pisces">Pisces</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" name="message" rows="5"
            placeholder="Write down what the stars whisper to you…" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Cosmic Message</button>
      </form>

    </div>
  </section>

  <script>
    document.getElementById('hamburger').addEventListener('click', () => {
      document.querySelector('.navbar__links').classList.toggle('open');
    });
  </script>

</body>
</html>
