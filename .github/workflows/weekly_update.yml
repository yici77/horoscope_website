name: Weekly Horoscope Update

on:
  schedule:
    - cron: '0 9 * * 1'  # monday morning at 9:00 AM UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 matplotlib

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "weekly update $(date +'%Y-%m-%d')" || echo "No changes"
          git push origin main

      - name: Reload PythonAnywhere
        run: |
          curl -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            https://www.pythonanywhere.com/api/v0/user/yici77/webapps/yici77.pythonanywhere.com/reload/